[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/pricing.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"

[functions."family-digest"]
  schedule = "0 14 * * 1"

[functions."vault-sweep"]
  schedule = "@daily"

[functions."sms-deadline-check"]
  schedule = "0 15 * * *"
